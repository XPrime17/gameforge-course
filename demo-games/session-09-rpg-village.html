<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session 9: Village Quest RPG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1A1A2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #E2E8F0;
    overflow: hidden;
  }
  #header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 8px;
    width: 960px;
  }
  h1 {
    font-size: 1.3rem;
    background: linear-gradient(135deg, #7C3AED, #F59E0B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hud {
    display: flex;
    gap: 14px;
    font-size: 0.85rem;
    margin-left: auto;
  }
  .hud-item {
    background: rgba(124, 58, 237, 0.2);
    border: 1px solid rgba(124, 58, 237, 0.4);
    padding: 3px 12px;
    border-radius: 20px;
  }
  .hud-item span { color: #F59E0B; font-weight: bold; }
  #game-container {
    display: flex;
    gap: 12px;
  }
  canvas {
    border: 2px solid #7C3AED;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
  }
  #sidebar {
    width: 220px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .panel {
    background: rgba(15, 15, 35, 0.9);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .panel h3 {
    font-size: 0.8rem;
    color: #7C3AED;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(124, 58, 237, 0.2);
    padding-bottom: 4px;
  }
  .panel-content {
    font-size: 0.78rem;
    line-height: 1.5;
    color: #94A3B8;
  }
  .quest-item {
    padding: 3px 0;
    border-bottom: 1px solid rgba(124, 58, 237, 0.1);
  }
  .quest-item.complete { color: #10B981; text-decoration: line-through; opacity: 0.6; }
  .quest-item.active { color: #F59E0B; }
  .inv-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
  }
  .inv-item .emoji { font-size: 1rem; }
  .inv-item .count { color: #F59E0B; margin-left: auto; }
  #controls {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #64748B;
    width: 960px;
    text-align: center;
  }
  kbd {
    background: #334155;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid #475569;
    font-size: 0.7rem;
  }
</style>
</head>
<body>
<div id="header">
  <h1>Session 9: Village Quest RPG</h1>
  <div class="hud">
    <div class="hud-item">Gold: <span id="gold">50</span></div>
    <div class="hud-item">HP: <span id="hp">10/10</span></div>
    <div class="hud-item">Area: <span id="area">Village</span></div>
  </div>
</div>
<div id="game-container">
  <canvas id="game" width="720" height="520"></canvas>
  <div id="sidebar">
    <div class="panel">
      <h3>Quest Log</h3>
      <div class="panel-content" id="quests"></div>
    </div>
    <div class="panel">
      <h3>Inventory</h3>
      <div class="panel-content" id="inventory"></div>
    </div>
    <div class="panel">
      <h3>Hint</h3>
      <div class="panel-content" id="hint">Talk to the villagers to learn about the lost treasure!</div>
    </div>
  </div>
</div>
<div id="controls">
  <kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&larr;</kbd><kbd>&rarr;</kbd> Move &nbsp;&nbsp;
  <kbd>Enter</kbd> / <kbd>E</kbd> Interact &nbsp;&nbsp;
  <kbd>R</kbd> Restart &nbsp;&nbsp;
  <kbd>1</kbd>-<kbd>3</kbd> Dialogue choices
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 720, H = 520;
const TILE = 40;
const COLS = W / TILE; // 18
const ROWS = H / TILE; // 13

const goldEl = document.getElementById('gold');
const hpEl = document.getElementById('hp');
const areaEl = document.getElementById('area');
const questsEl = document.getElementById('quests');
const inventoryEl = document.getElementById('inventory');
const hintEl = document.getElementById('hint');

// Input
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR' && game.state !== 'dialogue') initGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Tile types
const T = {
  EMPTY: 0,
  GRASS: 1,
  PATH: 2,
  WATER: 3,
  WALL: 4,
  TREE: 5,
  HOUSE: 6,
  DOOR: 7,
  ROCK: 8,
  FLOWER: 9,
  CAVE_WALL: 10,
  CAVE_FLOOR: 11,
  SHOP_FLOOR: 12,
  TREASURE: 13,
  SIGN: 14,
  FENCE: 15,
};

const TILE_COLORS = {
  [T.EMPTY]: '#1A1A2E',
  [T.GRASS]: '#166534',
  [T.PATH]: '#92400E',
  [T.WATER]: '#1E40AF',
  [T.WALL]: '#475569',
  [T.TREE]: '#15803D',
  [T.HOUSE]: '#7C3AED',
  [T.DOOR]: '#F59E0B',
  [T.ROCK]: '#6B7280',
  [T.FLOWER]: '#166534',
  [T.CAVE_WALL]: '#374151',
  [T.CAVE_FLOOR]: '#4B5563',
  [T.SHOP_FLOOR]: '#78350F',
  [T.TREASURE]: '#F59E0B',
  [T.SIGN]: '#92400E',
  [T.FENCE]: '#92400E',
};

const TILE_EMOJIS = {
  [T.TREE]: '\u{1F332}',
  [T.FLOWER]: '\u{1F33A}',
  [T.ROCK]: '\u{1FAA8}',
  [T.HOUSE]: '\u{1F3E0}',
  [T.SIGN]: '\u{1FAB5}',
  [T.WATER]: '\u{1F30A}',
};

const SOLID_TILES = new Set([T.WALL, T.TREE, T.HOUSE, T.ROCK, T.WATER, T.CAVE_WALL, T.FENCE]);

// Area maps (18x13 grids)
function createVillageMap() {
  let m = [];
  for (let y = 0; y < ROWS; y++) {
    m[y] = [];
    for (let x = 0; x < COLS; x++) {
      m[y][x] = T.GRASS;
    }
  }

  // Border trees
  for (let x = 0; x < COLS; x++) {
    m[0][x] = T.TREE;
    m[ROWS-1][x] = T.TREE;
  }
  for (let y = 0; y < ROWS; y++) {
    m[y][0] = T.TREE;
    m[y][COLS-1] = T.TREE;
  }

  // Main paths - cross shape
  for (let x = 2; x < COLS - 2; x++) {
    m[6][x] = T.PATH;
    m[7][x] = T.PATH;
  }
  for (let y = 2; y < ROWS - 2; y++) {
    m[y][8] = T.PATH;
    m[y][9] = T.PATH;
  }

  // Houses
  // Elder's house (top-left)
  for (let y = 2; y < 5; y++) for (let x = 2; x < 6; x++) m[y][x] = T.HOUSE;
  m[4][4] = T.DOOR;

  // Merchant house (top-right) - shop
  for (let y = 2; y < 5; y++) for (let x = 12; x < 16; x++) m[y][x] = T.HOUSE;
  m[4][14] = T.DOOR;

  // Guard house (bottom-left)
  for (let y = 9; y < 11; y++) for (let x = 2; x < 5; x++) m[y][x] = T.HOUSE;
  m[9][3] = T.DOOR;

  // Decorations
  m[2][7] = T.FLOWER;
  m[3][10] = T.FLOWER;
  m[8][3] = T.FLOWER;
  m[10][12] = T.FLOWER;
  m[5][11] = T.FLOWER;

  // Water pond
  m[9][12] = T.WATER;
  m[9][13] = T.WATER;
  m[10][12] = T.WATER;
  m[10][13] = T.WATER;

  // Fence near pond
  m[8][11] = T.FENCE;
  m[8][14] = T.FENCE;
  m[11][12] = T.FENCE;
  m[11][13] = T.FENCE;

  // Sign post
  m[5][9] = T.SIGN;

  // Exits - right side to forest, bottom to cave
  m[6][COLS-1] = T.PATH;
  m[7][COLS-1] = T.PATH;
  m[ROWS-1][8] = T.PATH;
  m[ROWS-1][9] = T.PATH;

  // Some extra trees for decoration
  m[3][7] = T.TREE;
  m[8][6] = T.TREE;
  m[10][7] = T.TREE;
  m[3][11] = T.TREE;

  return m;
}

function createForestMap() {
  let m = [];
  for (let y = 0; y < ROWS; y++) {
    m[y] = [];
    for (let x = 0; x < COLS; x++) {
      m[y][x] = T.GRASS;
    }
  }

  // Dense tree borders and scattered throughout
  for (let x = 0; x < COLS; x++) {
    m[0][x] = T.TREE;
    m[ROWS-1][x] = T.TREE;
  }
  for (let y = 0; y < ROWS; y++) {
    m[y][COLS-1] = T.TREE;
  }

  // Left side entrance from village
  for (let y = 0; y < ROWS; y++) {
    m[y][0] = T.TREE;
  }
  m[6][0] = T.PATH;
  m[7][0] = T.PATH;

  // Winding path
  for (let x = 1; x < 5; x++) { m[6][x] = T.PATH; m[7][x] = T.PATH; }
  for (let y = 3; y < 8; y++) { m[y][4] = T.PATH; m[y][5] = T.PATH; }
  for (let x = 5; x < 10; x++) { m[3][x] = T.PATH; m[4][x] = T.PATH; }
  for (let y = 3; y < 10; y++) { m[y][9] = T.PATH; m[y][10] = T.PATH; }
  for (let x = 10; x < 15; x++) { m[9][x] = T.PATH; m[10][x] = T.PATH; }

  // Scattered trees
  let treePlaces = [
    [2,2],[2,7],[2,12],[2,15],
    [4,1],[4,7],[4,13],[4,16],
    [5,3],[5,12],[5,15],
    [6,7],[6,14],
    [7,2],[7,13],[7,16],
    [8,1],[8,5],[8,7],[8,14],
    [9,3],[9,6],
    [10,1],[10,5],[10,14],
    [11,3],[11,7],[11,10],[11,14],
  ];
  for (let [y, x] of treePlaces) {
    if (x < COLS && y < ROWS) m[y][x] = T.TREE;
  }

  // Rocks
  m[5][8] = T.ROCK;
  m[8][12] = T.ROCK;
  m[3][14] = T.ROCK;

  // Flowers
  m[6][3] = T.FLOWER;
  m[8][8] = T.FLOWER;
  m[4][11] = T.FLOWER;

  // Sword location (sparkle on the path)
  m[9][13] = T.PATH; // Clear spot for sword

  return m;
}

function createCaveMap() {
  let m = [];
  for (let y = 0; y < ROWS; y++) {
    m[y] = [];
    for (let x = 0; x < COLS; x++) {
      m[y][x] = T.CAVE_WALL;
    }
  }

  // Carve out cave corridors
  // Entrance corridor
  for (let x = 7; x < 11; x++) { m[1][x] = T.CAVE_FLOOR; m[2][x] = T.CAVE_FLOOR; }
  // Main chamber
  for (let y = 2; y < 7; y++) for (let x = 4; x < 14; x++) m[y][x] = T.CAVE_FLOOR;
  // Narrow passage
  for (let y = 6; y < 9; y++) { m[y][8] = T.CAVE_FLOOR; m[y][9] = T.CAVE_FLOOR; }
  // Treasure room
  for (let y = 8; y < 12; y++) for (let x = 5; x < 13; x++) m[y][x] = T.CAVE_FLOOR;

  // Rocks inside
  m[3][6] = T.ROCK;
  m[4][11] = T.ROCK;
  m[5][5] = T.ROCK;
  m[10][7] = T.ROCK;
  m[10][11] = T.ROCK;

  // Treasure
  m[10][9] = T.TREASURE;

  // Entrance at top
  m[0][8] = T.CAVE_FLOOR;
  m[0][9] = T.CAVE_FLOOR;

  return m;
}

function createShopMap() {
  let m = [];
  for (let y = 0; y < ROWS; y++) {
    m[y] = [];
    for (let x = 0; x < COLS; x++) {
      m[y][x] = T.WALL;
    }
  }

  // Shop interior
  for (let y = 2; y < 11; y++) for (let x = 3; x < 15; x++) m[y][x] = T.SHOP_FLOOR;

  // Counter
  for (let x = 6; x < 12; x++) m[3][x] = T.FENCE;

  // Door (exit at bottom)
  m[11][8] = T.SHOP_FLOOR;
  m[11][9] = T.SHOP_FLOOR;
  m[12][8] = T.DOOR;
  m[12][9] = T.DOOR;

  return m;
}

// NPCs
const NPC_DEFS = {
  elder: {
    emoji: '\u{1F474}',
    name: 'Village Elder',
    area: 'village',
    x: 4, y: 5,
    dialogue: [
      {
        text: 'Welcome, young ninja! Our village has a problem. A legendary sword was lost in the forest. Without it, we cannot enter the cave where our treasure lies.',
        choices: [
          { text: 'I will find the sword!', next: 1 },
          { text: 'Tell me more about the cave.', next: 2 },
        ],
      },
      {
        text: 'Brave ninja! The sword was lost somewhere deep in the forest to the east. Follow the winding path carefully. Good luck!',
        choices: [{ text: 'Thank you, Elder!', next: -1 }],
        onComplete: (g) => { g.quests[0].active = true; setHint('Find the lost sword in the forest to the east.'); },
      },
      {
        text: 'The cave to the south holds our village treasure. But a guard blocks the entrance. Only one who carries the legendary sword may pass.',
        choices: [
          { text: 'I will find the sword first!', next: 1 },
          { text: 'Understood.', next: -1 },
        ],
      },
    ],
  },
  merchant: {
    emoji: '\u{1F9D1}\u200D\u{1F373}',
    name: 'Merchant',
    area: 'village',
    x: 14, y: 5,
    dialogue: [
      {
        text: 'Welcome to my shop! I sell useful items for adventurers. Would you like to see my wares?',
        choices: [
          { text: 'Show me what you have!', next: 1 },
          { text: 'Not right now.', next: -1 },
        ],
      },
      {
        text: 'I have: Health Potion (30 gold, heals 5 HP) or a Map (20 gold, shows hints). What would you like?',
        choices: [
          { text: 'Buy Health Potion (30g)', next: 2, action: 'buyPotion' },
          { text: 'Buy Map (20g)', next: 3, action: 'buyMap' },
          { text: 'Nothing, thanks.', next: -1 },
        ],
      },
      {
        text: 'Here is your Health Potion! Use it wisely on your adventure.',
        choices: [{ text: 'Thanks!', next: -1 }],
      },
      {
        text: 'Here is the Map! It marks important locations on your journey.',
        choices: [{ text: 'Thanks!', next: -1 }],
      },
    ],
  },
  guard: {
    emoji: '\u{1F482}',
    name: 'Cave Guard',
    area: 'village',
    x: 9, y: 11,
    dialogue: [
      {
        text: 'Halt! No one may enter the cave without the legendary sword. It is too dangerous!',
        choices: [
          { text: 'I will return with the sword.', next: -1 },
        ],
        condition: (g) => !g.inventory.sword,
      },
      {
        text: 'You found the legendary sword! You are worthy. The cave entrance is now open. Beware of the darkness within!',
        choices: [
          { text: 'I am ready!', next: -1 },
        ],
        condition: (g) => g.inventory.sword,
        onComplete: (g) => {
          g.quests[1].complete = true;
          g.quests[2].active = true;
          g.caveOpen = true;
          setHint('The cave is now open! Enter from the south exit.');
        },
      },
    ],
  },
  shopkeeper: {
    emoji: '\u{1F9D9}',
    name: 'Shopkeeper',
    area: 'shop',
    x: 9, y: 2,
    dialogue: [
      {
        text: 'Welcome to the item shop! I have the finest goods in the village.',
        choices: [
          { text: 'Buy Health Potion (30g)', next: 1, action: 'buyPotion' },
          { text: 'Buy Map (20g)', next: 2, action: 'buyMap' },
          { text: 'Just looking.', next: -1 },
        ],
      },
      {
        text: 'A wise purchase! This potion will restore your health.',
        choices: [{ text: 'Thanks!', next: -1 }],
      },
      {
        text: 'The map reveals hidden paths. Very useful for a ninja!',
        choices: [{ text: 'Thanks!', next: -1 }],
      },
    ],
  },
};

// Game state
let game, player, currentMap, npcs, interactables;

function initGame() {
  game = {
    state: 'title', // title, playing, dialogue, win
    area: 'village',
    timer: 0,
    gold: 50,
    hp: 10,
    maxHP: 10,
    caveOpen: false,
    inventory: {
      sword: false,
      potion: 0,
      map: false,
    },
    quests: [
      { name: 'Talk to the Elder', active: true, complete: false },
      { name: 'Find the lost sword', active: false, complete: false },
      { name: 'Enter the cave', active: false, complete: false },
      { name: 'Find the treasure', active: false, complete: false },
    ],
    dialogue: null,
    dialogueNPC: null,
    dialogueIndex: 0,
    moveTimer: 0,
    particles: [],
  };

  player = {
    x: 9, y: 8,
    facing: 0, // 0=down, 1=left, 2=right, 3=up
    animFrame: 0,
    animTimer: 0,
  };

  loadArea('village');
  updateSidebar();
}

function setHint(text) {
  hintEl.textContent = text;
}

function loadArea(area) {
  game.area = area;
  areaEl.textContent = area.charAt(0).toUpperCase() + area.slice(1);

  if (area === 'village') {
    currentMap = createVillageMap();
    npcs = [
      { ...NPC_DEFS.elder },
      { ...NPC_DEFS.merchant },
      { ...NPC_DEFS.guard },
    ];
    interactables = [];
  } else if (area === 'forest') {
    currentMap = createForestMap();
    npcs = [];
    interactables = [];
    if (!game.quests[1].complete) {
      interactables.push({
        x: 13, y: 9,
        emoji: '\u{2694}\u{FE0F}',
        name: 'Legendary Sword',
        type: 'sword',
      });
    }
  } else if (area === 'cave') {
    currentMap = createCaveMap();
    npcs = [];
    interactables = [];
    if (!game.quests[3].complete) {
      interactables.push({
        x: 9, y: 10,
        emoji: '\u{1F48E}',
        name: 'Village Treasure',
        type: 'treasure',
      });
    }
  } else if (area === 'shop') {
    currentMap = createShopMap();
    npcs = [{ ...NPC_DEFS.shopkeeper }];
    interactables = [];
  }
}

function updateSidebar() {
  // Quests
  let qhtml = '';
  for (let q of game.quests) {
    let cls = q.complete ? 'complete' : (q.active ? 'active' : '');
    let prefix = q.complete ? '\u2705' : (q.active ? '\u{1F4CC}' : '\u2B1C');
    qhtml += `<div class="quest-item ${cls}">${prefix} ${q.name}</div>`;
  }
  questsEl.innerHTML = qhtml;

  // Inventory
  let ihtml = '';
  if (game.inventory.sword) {
    ihtml += '<div class="inv-item"><span class="emoji">\u{2694}\u{FE0F}</span> Legendary Sword</div>';
  }
  if (game.inventory.potion > 0) {
    ihtml += `<div class="inv-item"><span class="emoji">\u{1F9EA}</span> Health Potion <span class="count">x${game.inventory.potion}</span></div>`;
  }
  if (game.inventory.map) {
    ihtml += '<div class="inv-item"><span class="emoji">\u{1F5FA}\u{FE0F}</span> Map</div>';
  }
  if (!ihtml) ihtml = '<div style="color:#475569">Empty</div>';
  inventoryEl.innerHTML = ihtml;

  goldEl.textContent = game.gold;
  hpEl.textContent = `${game.hp}/${game.maxHP}`;
}

function spawnParticles(px, py, color, count) {
  for (let i = 0; i < count; i++) {
    game.particles.push({
      x: px * TILE + TILE / 2,
      y: py * TILE + TILE / 2,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 1,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color,
      size: 2 + Math.random() * 2,
    });
  }
}

function tryMove(dx, dy) {
  if (game.moveTimer > 0) return;

  // Set facing
  if (dy > 0) player.facing = 0;
  else if (dx < 0) player.facing = 1;
  else if (dx > 0) player.facing = 2;
  else if (dy < 0) player.facing = 3;

  let nx = player.x + dx;
  let ny = player.y + dy;

  // Check area transitions
  if (game.area === 'village') {
    // Right exit to forest
    if (nx >= COLS && (player.y === 6 || player.y === 7)) {
      loadArea('forest');
      player.x = 1;
      player.y = player.y;
      game.moveTimer = 8;
      return;
    }
    // Bottom exit to cave (only if open)
    if (ny >= ROWS && (player.x === 8 || player.x === 9)) {
      if (game.caveOpen) {
        loadArea('cave');
        player.x = player.x;
        player.y = 1;
        game.moveTimer = 8;
        return;
      } else {
        setHint('The cave guard blocks the path. You need the legendary sword!');
        return;
      }
    }
    // Enter shop door
    if (nx === 14 && ny === 4 && currentMap[4][14] === T.DOOR) {
      loadArea('shop');
      player.x = 8;
      player.y = 10;
      game.moveTimer = 8;
      return;
    }
  } else if (game.area === 'forest') {
    // Left exit back to village
    if (nx < 0 && (player.y === 6 || player.y === 7)) {
      loadArea('village');
      player.x = COLS - 2;
      player.y = player.y;
      game.moveTimer = 8;
      return;
    }
  } else if (game.area === 'cave') {
    // Top exit back to village
    if (ny < 0 && (player.x === 8 || player.x === 9)) {
      loadArea('village');
      player.x = player.x;
      player.y = ROWS - 2;
      game.moveTimer = 8;
      return;
    }
  } else if (game.area === 'shop') {
    // Exit shop
    if (ny >= ROWS || (ny === 12 && (nx === 8 || nx === 9))) {
      loadArea('village');
      player.x = 14;
      player.y = 6;
      game.moveTimer = 8;
      return;
    }
  }

  // Bounds check
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;

  // Solid tile check
  if (SOLID_TILES.has(currentMap[ny][nx])) return;

  // NPC blocking
  for (let npc of npcs) {
    if (npc.x === nx && npc.y === ny) return;
  }

  player.x = nx;
  player.y = ny;
  game.moveTimer = 8;

  // Animation
  player.animFrame = (player.animFrame + 1) % 4;
}

function interact() {
  // Direction offsets based on facing
  let dx = 0, dy = 0;
  if (player.facing === 0) dy = 1;
  else if (player.facing === 1) dx = -1;
  else if (player.facing === 2) dx = 1;
  else dy = -1;

  let tx = player.x + dx;
  let ty = player.y + dy;

  // Check NPCs nearby (including standing on same tile)
  for (let npc of npcs) {
    let dist = Math.abs(npc.x - player.x) + Math.abs(npc.y - player.y);
    if (dist <= 2 && ((npc.x === tx && npc.y === ty) || dist === 1)) {
      startDialogue(npc);
      return;
    }
  }

  // Check interactables
  for (let item of interactables) {
    let dist = Math.abs(item.x - player.x) + Math.abs(item.y - player.y);
    if (dist <= 1) {
      pickupItem(item);
      return;
    }
  }

  // Check sign
  if (currentMap[ty] && currentMap[ty][tx] === T.SIGN) {
    game.state = 'dialogue';
    game.dialogue = {
      text: 'Village Square\n\u2190 Elder\'s House    Shop \u2192\n\u2193 Cave (Guarded)    Forest \u2192',
      choices: [{ text: 'OK', next: -1 }],
    };
    game.dialogueNPC = { name: 'Sign Post', emoji: '\u{1FAB5}' };
    game.dialogueIndex = 0;
  }
}

function pickupItem(item) {
  if (item.type === 'sword') {
    game.inventory.sword = true;
    game.quests[1].complete = true;
    game.quests[1].active = false;
    interactables = interactables.filter(i => i !== item);
    spawnParticles(item.x, item.y, '#F59E0B', 15);
    setHint('You found the legendary sword! Return to the cave guard.');

    game.state = 'dialogue';
    game.dialogue = {
      text: 'You found the Legendary Sword! Its blade glows with ancient power. Return to the village and show it to the cave guard!',
      choices: [{ text: 'Excellent!', next: -1 }],
    };
    game.dialogueNPC = { name: 'Discovery', emoji: '\u{2694}\u{FE0F}' };
    game.dialogueIndex = 0;
  } else if (item.type === 'treasure') {
    game.quests[3].complete = true;
    game.quests[3].active = false;
    game.gold += 500;
    interactables = interactables.filter(i => i !== item);
    spawnParticles(item.x, item.y, '#7C3AED', 20);
    game.state = 'win';
  }
  updateSidebar();
}

function startDialogue(npcDef) {
  game.dialogueNPC = npcDef;
  game.dialogueIndex = 0;

  // Find the right dialogue based on conditions
  let dialogues = NPC_DEFS[Object.keys(NPC_DEFS).find(k => NPC_DEFS[k].name === npcDef.name)]?.dialogue;
  if (!dialogues) return;

  // For guard, pick based on condition
  if (npcDef.name === 'Cave Guard') {
    let idx = game.inventory.sword ? 1 : 0;
    game.dialogue = dialogues[idx];
  } else {
    game.dialogue = dialogues[0];
  }

  game.dialogueIndex = 0;
  game.state = 'dialogue';
  game.dialogueFullDef = dialogues;
}

function handleDialogueChoice(choiceIdx) {
  if (!game.dialogue || !game.dialogue.choices) return;
  let choice = game.dialogue.choices[choiceIdx];
  if (!choice) return;

  // Handle actions
  if (choice.action === 'buyPotion') {
    if (game.gold >= 30) {
      game.gold -= 30;
      game.inventory.potion++;
      game.hp = Math.min(game.maxHP, game.hp + 5);
      spawnParticles(player.x, player.y, '#10B981', 8);
    } else {
      game.dialogue = { text: 'You don\'t have enough gold!', choices: [{ text: 'OK', next: -1 }] };
      updateSidebar();
      return;
    }
  } else if (choice.action === 'buyMap') {
    if (game.gold >= 20) {
      game.gold -= 20;
      game.inventory.map = true;
      setHint('Map acquired! The sword is deep in the forest, at the end of the winding path.');
      spawnParticles(player.x, player.y, '#F59E0B', 8);
    } else {
      game.dialogue = { text: 'You don\'t have enough gold!', choices: [{ text: 'OK', next: -1 }] };
      updateSidebar();
      return;
    }
  }

  if (choice.next === -1) {
    // End dialogue
    if (game.dialogue.onComplete) game.dialogue.onComplete(game);
    game.state = 'playing';
    game.dialogue = null;

    // Mark first quest complete when talking to elder
    if (game.dialogueNPC?.name === 'Village Elder' && !game.quests[0].complete) {
      game.quests[0].complete = true;
      game.quests[1].active = true;
    }
  } else {
    let nextDialogue = game.dialogueFullDef?.[choice.next];
    if (nextDialogue) {
      if (nextDialogue.onComplete) nextDialogue.onComplete(game);
      game.dialogue = nextDialogue;
    } else {
      game.state = 'playing';
      game.dialogue = null;
    }
  }
  updateSidebar();
}

function update() {
  game.timer++;

  if (game.state === 'title') return;

  if (game.state === 'dialogue') {
    // Check for choice keys
    if (game.dialogue && game.dialogue.choices) {
      for (let i = 0; i < game.dialogue.choices.length; i++) {
        if (justPressed[`Digit${i + 1}`] || justPressed[`Numpad${i + 1}`]) {
          handleDialogueChoice(i);
        }
      }
      // Enter selects first choice
      if (justPressed['Enter'] || justPressed['KeyE']) {
        handleDialogueChoice(0);
      }
    }
    // Clear justPressed
    for (let k in justPressed) justPressed[k] = false;
    return;
  }

  if (game.state === 'win') {
    if (justPressed['Enter'] || justPressed['Space']) {
      initGame();
    }
    for (let k in justPressed) justPressed[k] = false;
    return;
  }

  // Movement
  if (game.moveTimer > 0) game.moveTimer--;

  if (game.moveTimer <= 0) {
    if (keys['ArrowUp'] || keys['KeyW']) tryMove(0, -1);
    else if (keys['ArrowDown'] || keys['KeyS']) tryMove(0, 1);
    else if (keys['ArrowLeft'] || keys['KeyA']) tryMove(-1, 0);
    else if (keys['ArrowRight'] || keys['KeyD']) tryMove(1, 0);
  }

  // Interact
  if (justPressed['Enter'] || justPressed['KeyE']) {
    interact();
  }

  // Particles
  game.particles = game.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life--;
    return p.life > 0;
  });

  // Animation timer
  player.animTimer++;

  // Clear justPressed
  for (let k in justPressed) justPressed[k] = false;
}

// Rendering
function drawTile(x, y, type) {
  let px = x * TILE, py = y * TILE;

  // Base color
  let baseColor = TILE_COLORS[type] || '#1A1A2E';

  if (type === T.GRASS) {
    // Grass with slight variation
    let variation = Math.sin(x * 3.7 + y * 2.3) * 10;
    let r = 22, g = 101 + variation, b = 52;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(px, py, TILE, TILE);
    // Grass detail
    ctx.fillStyle = 'rgba(34, 197, 94, 0.15)';
    if ((x + y) % 3 === 0) {
      ctx.fillRect(px + 5, py + 8, 2, 6);
      ctx.fillRect(px + 20, py + 15, 2, 5);
    }
  } else if (type === T.PATH) {
    ctx.fillStyle = '#92400E';
    ctx.fillRect(px, py, TILE, TILE);
    // Path texture
    ctx.fillStyle = 'rgba(180, 120, 60, 0.2)';
    if ((x + y) % 2 === 0) {
      ctx.fillRect(px + 8, py + 8, 4, 4);
      ctx.fillRect(px + 24, py + 20, 3, 3);
    }
  } else if (type === T.WATER) {
    ctx.fillStyle = '#1E40AF';
    ctx.fillRect(px, py, TILE, TILE);
    // Water animation
    let wave = Math.sin(game.timer * 0.06 + x + y) * 0.15 + 0.85;
    ctx.fillStyle = `rgba(96, 165, 250, ${wave * 0.3})`;
    ctx.fillRect(px, py, TILE, TILE);
    // Wave lines
    ctx.strokeStyle = 'rgba(147, 197, 253, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    let wy = py + 12 + Math.sin(game.timer * 0.08 + x) * 3;
    ctx.moveTo(px + 4, wy);
    ctx.quadraticCurveTo(px + TILE / 2, wy - 4, px + TILE - 4, wy);
    ctx.stroke();
  } else if (type === T.WALL || type === T.CAVE_WALL) {
    ctx.fillStyle = type === T.CAVE_WALL ? '#374151' : '#475569';
    ctx.fillRect(px, py, TILE, TILE);
    // Brick pattern
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, TILE, TILE / 2);
    ctx.strokeRect(px + TILE / 2, py + TILE / 2, TILE / 2, TILE / 2);
  } else if (type === T.CAVE_FLOOR) {
    ctx.fillStyle = '#4B5563';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = 'rgba(107, 114, 128, 0.15)';
    if ((x * 7 + y * 13) % 5 === 0) {
      ctx.fillRect(px + 10, py + 10, 6, 6);
    }
  } else if (type === T.SHOP_FLOOR) {
    ctx.fillStyle = '#78350F';
    ctx.fillRect(px, py, TILE, TILE);
    // Wood grain
    ctx.fillStyle = 'rgba(146, 64, 14, 0.3)';
    ctx.fillRect(px, py + (x % 2) * 10, TILE, 2);
  } else if (type === T.DOOR) {
    ctx.fillStyle = '#92400E';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#F59E0B';
    ctx.fillRect(px + 8, py + 4, TILE - 16, TILE - 8);
    // Door knob
    ctx.fillStyle = '#D97706';
    ctx.beginPath();
    ctx.arc(px + TILE - 12, py + TILE / 2, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === T.TREASURE) {
    ctx.fillStyle = '#4B5563';
    ctx.fillRect(px, py, TILE, TILE);
    // Sparkle
    let sparkle = Math.sin(game.timer * 0.1) * 0.3 + 0.7;
    ctx.font = '28px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#F59E0B';
    ctx.shadowBlur = 10 * sparkle;
    ctx.fillText('\u{1F48E}', px + TILE / 2, py + TILE / 2);
    ctx.shadowBlur = 0;
  } else if (type === T.FENCE) {
    // Draw ground first
    if (game.area === 'shop') {
      ctx.fillStyle = '#78350F';
    } else {
      ctx.fillStyle = '#166534';
    }
    ctx.fillRect(px, py, TILE, TILE);
    // Fence
    ctx.fillStyle = '#92400E';
    ctx.fillRect(px, py + 12, TILE, 6);
    ctx.fillRect(px + 4, py + 6, 4, 18);
    ctx.fillRect(px + TILE - 8, py + 6, 4, 18);
    ctx.fillStyle = '#B45309';
    ctx.fillRect(px, py + 13, TILE, 2);
  } else {
    ctx.fillStyle = baseColor;
    ctx.fillRect(px, py, TILE, TILE);
  }

  // Emoji overlays for certain tiles
  if (type === T.TREE) {
    ctx.fillStyle = '#166534';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.font = '30px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F332}', px + TILE / 2, py + TILE / 2);
  } else if (type === T.FLOWER) {
    ctx.font = '18px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let sway = Math.sin(game.timer * 0.04 + x * 2) * 2;
    ctx.fillText('\u{1F33A}', px + TILE / 2 + sway, py + TILE / 2);
  } else if (type === T.ROCK) {
    ctx.font = '22px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1FAA8}', px + TILE / 2, py + TILE / 2);
  } else if (type === T.SIGN) {
    ctx.font = '22px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F6A7}', px + TILE / 2, py + TILE / 2);
  } else if (type === T.HOUSE) {
    // Already drawn as solid color, add roof detail
    ctx.fillStyle = 'rgba(91, 33, 182, 0.4)';
    ctx.fillRect(px, py, TILE, 3);
  }
}

function drawMap() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(x, y, currentMap[y][x]);
    }
  }
}

function drawNPCs() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let npc of npcs) {
    let px = npc.x * TILE + TILE / 2;
    let py = npc.y * TILE + TILE / 2;
    let bob = Math.sin(game.timer * 0.04 + npc.x) * 2;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(px, py + TILE / 2 - 2, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // NPC emoji
    ctx.font = '28px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.fillText(npc.emoji, px, py + bob - 2);

    // Interaction indicator (!)
    let dist = Math.abs(npc.x - player.x) + Math.abs(npc.y - player.y);
    if (dist <= 2) {
      let pulse = Math.sin(game.timer * 0.12) * 0.3 + 0.7;
      ctx.font = 'bold 14px "Segoe UI", sans-serif';
      ctx.fillStyle = `rgba(245, 158, 11, ${pulse})`;
      ctx.fillText('!', px, py - TILE / 2 - 4 + Math.sin(game.timer * 0.1) * 3);
    }
  }
}

function drawInteractables() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let item of interactables) {
    let px = item.x * TILE + TILE / 2;
    let py = item.y * TILE + TILE / 2;
    let float = Math.sin(game.timer * 0.08) * 4;
    let glow = Math.sin(game.timer * 0.1) * 0.3 + 0.7;

    ctx.shadowColor = '#F59E0B';
    ctx.shadowBlur = 12 * glow;
    ctx.font = '24px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
    ctx.fillText(item.emoji, px, py + float - 4);
    ctx.shadowBlur = 0;

    // Label
    ctx.font = '10px "Segoe UI", sans-serif';
    ctx.fillStyle = '#F59E0B';
    ctx.fillText(item.name, px, py + TILE / 2 + 6);
  }
}

function drawPlayer() {
  let px = player.x * TILE + TILE / 2;
  let py = player.y * TILE + TILE / 2;
  let bob = 0;
  if (game.moveTimer > 0) {
    bob = Math.sin(game.timer * 0.4) * 2;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(px, py + TILE / 2 - 2, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Player ninja
  ctx.font = '30px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.save();
  ctx.translate(px, py + bob - 2);
  // Flip based on facing
  if (player.facing === 1) ctx.scale(-1, 1);
  ctx.fillText('\u{1F977}', 0, 0);
  ctx.restore();

  // Direction indicator
  let dx = 0, dy = 0;
  if (player.facing === 0) dy = 1;
  else if (player.facing === 1) dx = -1;
  else if (player.facing === 2) dx = 1;
  else dy = -1;

  // Small arrow showing facing
  ctx.fillStyle = 'rgba(124, 58, 237, 0.5)';
  ctx.beginPath();
  ctx.arc(px + dx * 18, py + dy * 18, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  for (let p of game.particles) {
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawDialogue() {
  if (!game.dialogue) return;

  // Dialogue box
  let boxX = 40, boxY = H - 180, boxW = W - 80, boxH = 160;

  // Background
  ctx.fillStyle = 'rgba(15, 15, 35, 0.95)';
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxW, boxH, 8);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#7C3AED';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxW, boxH, 8);
  ctx.stroke();

  // NPC name
  ctx.font = 'bold 14px "Segoe UI", sans-serif';
  ctx.fillStyle = '#F59E0B';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  let nameText = game.dialogueNPC ? `${game.dialogueNPC.emoji || ''} ${game.dialogueNPC.name}` : '';
  ctx.fillText(nameText, boxX + 16, boxY + 12);

  // Dialogue text
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.fillStyle = '#E2E8F0';
  let lines = wrapText(game.dialogue.text, boxW - 40);
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], boxX + 16, boxY + 34 + i * 18);
  }

  // Choices
  if (game.dialogue.choices) {
    let choiceY = boxY + boxH - 12 - game.dialogue.choices.length * 22;
    for (let i = 0; i < game.dialogue.choices.length; i++) {
      let c = game.dialogue.choices[i];
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.fillStyle = '#A78BFA';
      let choiceText = `[${i + 1}] ${c.text}`;
      ctx.fillText(choiceText, boxX + 30, choiceY + i * 22);

      // Highlight indicator
      ctx.fillStyle = '#7C3AED';
      ctx.fillRect(boxX + 16, choiceY + i * 22 - 2, 8, 8);
    }
  }
}

function wrapText(text, maxWidth) {
  let words = text.split(' ');
  let lines = [];
  let current = '';
  ctx.font = '13px "Segoe UI", sans-serif';

  for (let word of words) {
    if (word.includes('\n')) {
      let parts = word.split('\n');
      for (let j = 0; j < parts.length; j++) {
        if (j > 0) {
          lines.push(current.trim());
          current = '';
        }
        let test = current + parts[j] + ' ';
        if (ctx.measureText(test).width > maxWidth) {
          lines.push(current.trim());
          current = parts[j] + ' ';
        } else {
          current = test;
        }
      }
    } else {
      let test = current + word + ' ';
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(current.trim());
        current = word + ' ';
      } else {
        current = test;
      }
    }
  }
  if (current.trim()) lines.push(current.trim());
  return lines;
}

function drawAreaLabel() {
  let areaNames = {
    village: '\u{1F3D8}\u{FE0F} Village',
    forest: '\u{1F332} Forest',
    cave: '\u{1F3D4}\u{FE0F} Cave',
    shop: '\u{1F3EA} Shop',
  };
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.fillStyle = 'rgba(167, 139, 250, 0.5)';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(areaNames[game.area] || game.area, 8, 4);
}

function drawTitleScreen() {
  // Background
  let grad = ctx.createLinearGradient(0, 0, 0, H);

  grad.addColorStop(1, '#1A1A2E');

  ctx.fillRect(0, 0, W, H);

  // Decorative tiles
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < 3; y++) {
      ctx.globalAlpha = 0.15;
      drawTile(x, y, T.TREE);
    }
    for (let y = ROWS - 3; y < ROWS; y++) {
      ctx.globalAlpha = 0.15;
      drawTile(x, y, T.TREE);
    }
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  let tGrad = ctx.createLinearGradient(W / 2 - 200, 0, W / 2 + 200, 0);
  tGrad.addColorStop(0, '#7C3AED');
  tGrad.addColorStop(0.5, '#F59E0B');
  tGrad.addColorStop(1, '#EC4899');
  ctx.fillStyle = tGrad;
  ctx.shadowColor = '#7C3AED';
  ctx.shadowBlur = 20;
  ctx.fillText('Village Quest', W / 2, H / 2 - 90);
  ctx.shadowBlur = 0;

  // Characters
  ctx.font = '48px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
  let bounce = Math.sin(game.timer * 0.05) * 6;
  ctx.fillText('\u{1F977}', W / 2 - 60, H / 2 + bounce);
  ctx.fillText('\u{2694}\u{FE0F}', W / 2, H / 2 - 10 + bounce);
  ctx.fillText('\u{1F48E}', W / 2 + 60, H / 2 + bounce);

  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#A78BFA';
  ctx.fillText('Arrow Keys to Move  |  Enter to Interact', W / 2, H / 2 + 60);

  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#64748B';
  ctx.fillText('Explore the village, find the lost sword, and discover the treasure!', W / 2, H / 2 + 90);

  let blink = Math.sin(game.timer * 0.08) > 0;
  if (blink) {
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#10B981';
    ctx.fillText('Press ENTER to begin', W / 2, H / 2 + 130);
  }
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(26, 26, 46, 0.88)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 44px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#F59E0B';
  ctx.shadowColor = '#F59E0B';
  ctx.shadowBlur = 25;
  ctx.fillText('Treasure Found!', W / 2, H / 2 - 60);
  ctx.shadowBlur = 0;

  ctx.font = '48px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
  let bounce = Math.sin(game.timer * 0.06) * 5;
  ctx.fillText('\u{1F48E}\u{1F451}\u{1F48E}', W / 2, H / 2 + bounce);

  ctx.font = '20px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#10B981';
  ctx.fillText(`You saved the village! Gold: ${game.gold}`, W / 2, H / 2 + 50);

  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#A78BFA';
  ctx.fillText('All quests completed!', W / 2, H / 2 + 80);

  let blink = Math.sin(game.timer * 0.08) > 0;
  if (blink) {
    ctx.font = '15px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#64748B';
    ctx.fillText('Press ENTER to play again', W / 2, H / 2 + 120);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);

  if (game.state === 'title') {
    drawTitleScreen();
    return;
  }

  drawMap();
  drawInteractables();
  drawNPCs();
  drawPlayer();
  drawParticles();
  drawAreaLabel();

  if (game.state === 'dialogue') {
    drawDialogue();
  }

  if (game.state === 'win') {
    drawWinScreen();
  }
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

// Handle title screen start
window.addEventListener('keydown', function titleHandler(e) {
  if (game.state === 'title' && (e.code === 'Enter' || e.code === 'Space')) {
    game.state = 'playing';
    window.removeEventListener('keydown', titleHandler);
  }
});

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();
</script>
