<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Jumper - Session 10 Mashup Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1A1A2E;
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; border-radius: 12px; image-rendering: pixelated; }
  #ui-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #hud {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 30px; z-index: 20;
    background: rgba(26,26,46,0.85); padding: 10px 30px; border-radius: 30px;
    border: 2px solid #7C3AED; backdrop-filter: blur(10px);
  }
  .hud-item { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; }
  .hud-label { color: #aaa; font-size: 13px; }
  #quiz-modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(26,26,46,0.97); border: 3px solid #7C3AED;
    border-radius: 20px; padding: 40px; z-index: 100;
    min-width: 500px; max-width: 600px; display: none;
    box-shadow: 0 0 60px rgba(124,58,237,0.5); pointer-events: all;
  }
  #quiz-modal.show { display: block; animation: popIn 0.3s ease-out; }
  @keyframes popIn { from { transform: translate(-50%,-50%) scale(0.7); opacity:0; } to { transform: translate(-50%,-50%) scale(1); opacity:1; } }
  #quiz-question { font-size: 22px; margin-bottom: 25px; line-height: 1.4; text-align: center; }
  .quiz-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .quiz-answer {
    background: rgba(124,58,237,0.2); border: 2px solid #7C3AED;
    border-radius: 12px; padding: 15px; font-size: 16px; color: #fff;
    cursor: pointer; transition: all 0.2s; text-align: center; pointer-events: all;
  }
  .quiz-answer:hover { background: rgba(124,58,237,0.5); transform: scale(1.03); }
  .quiz-answer.correct { background: rgba(16,185,129,0.5); border-color: #10B981; }
  .quiz-answer.wrong { background: rgba(236,72,153,0.5); border-color: #EC4899; }
  #boss-hp-container {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    width: 400px; z-index: 20; display: none;
  }
  #boss-name { text-align: center; font-size: 20px; color: #EC4899; font-weight: 700; margin-bottom: 5px; }
  #boss-hp-bar { width: 100%; height: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 2px solid #EC4899; }
  #boss-hp-fill { height: 100%; background: linear-gradient(90deg, #EC4899, #F59E0B); border-radius: 8px; transition: width 0.3s; }
  #screen-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(26,26,46,0.95); z-index: 200; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    pointer-events: all;
  }
  #screen-overlay.hidden { display: none; }
  #screen-overlay h1 { font-size: 60px; margin-bottom: 10px; }
  #screen-overlay h2 { font-size: 28px; color: #7C3AED; margin-bottom: 30px; }
  #screen-overlay p { font-size: 18px; color: #aaa; margin-bottom: 8px; line-height: 1.6; }
  #screen-overlay .controls { margin: 20px 0; padding: 20px; background: rgba(124,58,237,0.15); border-radius: 15px; }
  .start-btn {
    margin-top: 30px; padding: 16px 50px; font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff;
    border: none; border-radius: 30px; cursor: pointer; transition: all 0.3s;
    pointer-events: all;
  }
  .start-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(124,58,237,0.6); }
  #result-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 28px; font-weight: 700; z-index: 150; display: none;
    padding: 20px 40px; border-radius: 15px; animation: fadeUp 1.5s ease-out forwards;
  }
  @keyframes fadeUp { 0%{opacity:1;transform:translate(-50%,-50%)} 100%{opacity:0;transform:translate(-50%,-80%)} }
  #weapon-display {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 20; background: rgba(26,26,46,0.85); padding: 8px 25px;
    border-radius: 20px; border: 2px solid #F59E0B; font-size: 16px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" style="display:none;">
  <div class="hud-item">❤️ <span id="hp">5</span></div>
  <div class="hud-item">⚔️ <span id="weapon">Fists</span></div>
  <div class="hud-item">❓ <span id="quizzes">0</span>/3</div>
  <div class="hud-item">⭐ <span id="score">0</span></div>
</div>

<div id="boss-hp-container">
  <div id="boss-name">BOSS: The Quiz Master</div>
  <div id="boss-hp-bar"><div id="boss-hp-fill" style="width:100%"></div></div>
</div>

<div id="quiz-modal">
  <div id="quiz-question"></div>
  <div class="quiz-answers" id="quiz-answers"></div>
</div>

<div id="weapon-display" style="display:none;">
  <span id="weapon-icon">👊</span> <span id="weapon-name">Fists</span> — <span id="weapon-dmg">1 DMG</span>
</div>

<div id="result-msg"></div>

<div id="screen-overlay">
  <h1>Quiz Jumper</h1>
  <h2>Platformer + Quiz + Combat Mashup</h2>
  <div class="controls">
    <p>⬅️ ➡️ Arrow Keys to Move</p>
    <p>⬆️ or SPACE to Jump</p>
    <p>❓ Land on Quiz Stations for Power-Ups</p>
    <p>⚔️ Defeat the Boss after 3 Quizzes!</p>
    <p>💡 Correct answers = upgrades, Wrong = enemies!</p>
  </div>
  <button class="start-btn" onclick="startGame()">START GAME</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 1000, H = 600;
canvas.width = W; canvas.height = H;

// Game state
let state = 'title'; // title, platforming, quiz, boss, gameover, victory
let player, platforms, quizStations, enemies, projectiles, particles;
let boss = null;
let camera = { x: 0 };
let quizzesCompleted = 0;
let score = 0;
let keys = {};
let quizActive = false;
let bossPhase = false;
let currentQuiz = null;
let weaponLevel = 0;
let gravity = 0.6;
let worldWidth = 4000;

const weapons = [
  { name: 'Fists', icon: '👊', dmg: 1, speed: 0, color: '#aaa' },
  { name: 'Fire Bolt', icon: '🔥', dmg: 3, speed: 8, color: '#F59E0B' },
  { name: 'Ice Shard', icon: '❄️', dmg: 5, speed: 10, color: '#3B82F6' },
  { name: 'Lightning', icon: '⚡', dmg: 8, speed: 12, color: '#7C3AED' },
];

const quizQuestions = [
  { q: 'What HTML tag makes text bold?', answers: ['<b>', '<bold>', '<strong>', '<thick>'], correct: 0 },
  { q: 'What does CSS stand for?', answers: ['Computer Style Sheets', 'Cascading Style Sheets', 'Creative Style System', 'Colorful Style Sheets'], correct: 1 },
  { q: 'Which symbol starts a JavaScript comment?', answers: ['#', '//', '<!--', '**'], correct: 1 },
  { q: 'What is the canvas element used for?', answers: ['Text editing', 'Drawing graphics', 'Playing audio', 'Storing data'], correct: 1 },
  { q: 'What method draws a rectangle on canvas?', answers: ['drawRect()', 'fillRect()', 'makeRect()', 'rectangle()'], correct: 1 },
  { q: 'In JavaScript, what is an array?', answers: ['A single number', 'A list of items', 'A color value', 'A web page'], correct: 1 },
  { q: 'What event fires when a key is pressed?', answers: ['onclick', 'keydown', 'mousemove', 'keypress'], correct: 1 },
  { q: 'How do you create a variable in JS?', answers: ['variable x', 'let x', 'var: x', 'new x'], correct: 1 },
  { q: 'What does Math.random() return?', answers: ['Always 1', 'A number 0-1', 'A whole number', 'True or false'], correct: 1 },
];

function showMsg(text, color) {
  const el = document.getElementById('result-msg');
  el.textContent = text;
  el.style.color = color;
  el.style.background = `${color}22`;
  el.style.border = `2px solid ${color}`;
  el.style.display = 'block';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeUp 1.5s ease-out forwards';
  setTimeout(() => el.style.display = 'none', 1500);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 3 + Math.random() * 4,
    });
  }
}

function createPlatforms() {
  const plats = [];
  // Ground
  plats.push({ x: 0, y: H - 40, w: worldWidth, h: 40, type: 'ground' });
  // Platforms leading to quiz stations
  const layouts = [
    // Section 1: Easy platforms to first quiz
    { x: 200, y: H - 140, w: 120 },
    { x: 400, y: H - 220, w: 120 },
    { x: 600, y: H - 180, w: 120 },
    { x: 800, y: H - 260, w: 150 },
    // Section 2: More challenging
    { x: 1200, y: H - 160, w: 100 },
    { x: 1400, y: H - 250, w: 100 },
    { x: 1550, y: H - 180, w: 100 },
    { x: 1750, y: H - 300, w: 130 },
    { x: 1900, y: H - 200, w: 120 },
    // Section 3: Advanced
    { x: 2400, y: H - 180, w: 100 },
    { x: 2600, y: H - 280, w: 100 },
    { x: 2750, y: H - 200, w: 80 },
    { x: 2900, y: H - 320, w: 120 },
    { x: 3100, y: H - 240, w: 100 },
    // Boss arena
    { x: 3400, y: H - 160, w: 500 },
  ];
  layouts.forEach(p => plats.push({ ...p, type: 'platform' }));
  return plats;
}

function createQuizStations() {
  return [
    { x: 850, y: H - 260 - 50, w: 50, h: 50, used: false, id: 0 },
    { x: 1780, y: H - 300 - 50, w: 50, h: 50, used: false, id: 1 },
    { x: 2930, y: H - 320 - 50, w: 50, h: 50, used: false, id: 2 },
  ];
}

function initGame() {
  player = {
    x: 100, y: H - 100, w: 36, h: 48,
    vx: 0, vy: 0,
    onGround: false,
    hp: 5, maxHp: 5,
    facing: 1,
    attackCooldown: 0,
    invincible: 0,
    jumpCount: 0,
  };
  platforms = createPlatforms();
  quizStations = createQuizStations();
  enemies = [];
  projectiles = [];
  particles = [];
  boss = null;
  quizzesCompleted = 0;
  score = 0;
  weaponLevel = 0;
  bossPhase = false;
  quizActive = false;
  camera = { x: 0 };
  updateHUD();
}

function startGame() {
  document.getElementById('screen-overlay').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('weapon-display').style.display = 'block';
  initGame();
  state = 'platforming';
}

function updateHUD() {
  document.getElementById('hp').textContent = '❤️'.repeat(Math.max(0, player.hp));
  document.getElementById('weapon').textContent = weapons[weaponLevel].name;
  document.getElementById('quizzes').textContent = quizzesCompleted;
  document.getElementById('score').textContent = score;
  const w = weapons[weaponLevel];
  document.getElementById('weapon-icon').textContent = w.icon;
  document.getElementById('weapon-name').textContent = w.name;
  document.getElementById('weapon-dmg').textContent = `${w.dmg} DMG`;
}

function spawnEnemy(x, y) {
  enemies.push({
    x, y, w: 36, h: 40,
    vx: (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random()),
    vy: 0, hp: 3, maxHp: 3,
    type: 'goblin',
    onGround: false,
    hitTimer: 0,
  });
}

function spawnBoss() {
  bossPhase = true;
  boss = {
    x: 3600, y: H - 200, w: 64, h: 80,
    vx: 2, vy: 0,
    hp: 30, maxHp: 30,
    attackTimer: 0,
    phase: 1,
    hitTimer: 0,
    onGround: false,
  };
  document.getElementById('boss-hp-container').style.display = 'block';
}

function openQuiz(station) {
  quizActive = true;
  station.used = true;
  const qIdx = Math.floor(Math.random() * quizQuestions.length);
  currentQuiz = { ...quizQuestions[qIdx], station };

  document.getElementById('quiz-question').textContent = currentQuiz.q;
  const answersEl = document.getElementById('quiz-answers');
  answersEl.innerHTML = '';
  currentQuiz.answers.forEach((a, i) => {
    const btn = document.createElement('div');
    btn.className = 'quiz-answer';
    btn.textContent = a;
    btn.onclick = () => answerQuiz(i, btn);
    answersEl.appendChild(btn);
  });
  document.getElementById('quiz-modal').classList.add('show');
}

function answerQuiz(idx, btn) {
  if (!quizActive) return;
  const allBtns = document.querySelectorAll('.quiz-answer');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  if (idx === currentQuiz.correct) {
    btn.classList.add('correct');
    allBtns[currentQuiz.correct].classList.add('correct');
    quizzesCompleted++;
    score += 500;
    // Upgrade weapon
    if (weaponLevel < weapons.length - 1) {
      weaponLevel++;
      showMsg(`UPGRADE: ${weapons[weaponLevel].icon} ${weapons[weaponLevel].name}!`, '#10B981');
    }
    // Restore health
    player.hp = Math.min(player.maxHp, player.hp + 2);
    spawnParticles(player.x, player.y, '#10B981', 20);
  } else {
    btn.classList.add('wrong');
    allBtns[currentQuiz.correct].classList.add('correct');
    showMsg('WRONG! Enemy spawns!', '#EC4899');
    spawnEnemy(player.x + 200, player.y - 60);
    spawnEnemy(player.x - 200, player.y - 60);
  }

  setTimeout(() => {
    document.getElementById('quiz-modal').classList.remove('show');
    quizActive = false;
    currentQuiz = null;
    updateHUD();
    // Check if boss should spawn
    if (quizzesCompleted >= 3 && !bossPhase) {
      setTimeout(() => {
        showMsg('BOSS INCOMING: The Quiz Master!', '#EC4899');
        spawnBoss();
      }, 500);
    }
  }, 1200);
}

function playerAttack() {
  if (player.attackCooldown > 0) return;
  const w = weapons[weaponLevel];
  player.attackCooldown = weaponLevel === 0 ? 20 : 15;

  if (weaponLevel === 0) {
    // Melee punch
    const hitbox = {
      x: player.x + (player.facing > 0 ? player.w : -30),
      y: player.y, w: 30, h: player.h
    };
    enemies.forEach(e => {
      if (rectsOverlap(hitbox, e)) {
        e.hp -= w.dmg;
        e.hitTimer = 10;
        e.vx = player.facing * 5;
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#F59E0B', 8);
      }
    });
    if (boss && rectsOverlap(hitbox, boss)) {
      boss.hp -= w.dmg;
      boss.hitTimer = 10;
      spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#EC4899', 10);
    }
  } else {
    // Ranged projectile
    projectiles.push({
      x: player.x + player.w/2,
      y: player.y + player.h/2 - 5,
      vx: player.facing * w.speed,
      vy: 0,
      dmg: w.dmg,
      color: w.color,
      life: 60,
      owner: 'player',
      size: 6 + weaponLevel * 2,
    });
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updatePlayer() {
  // Movement
  if (keys['ArrowLeft'] || keys['a']) { player.vx = -5; player.facing = -1; }
  else if (keys['ArrowRight'] || keys['d']) { player.vx = 5; player.facing = 1; }
  else { player.vx *= 0.8; }

  // Jump
  if ((keys['ArrowUp'] || keys[' '] || keys['w']) && player.onGround) {
    player.vy = -13;
    player.onGround = false;
    player.jumpCount++;
    spawnParticles(player.x + player.w/2, player.y + player.h, '#7C3AED', 6);
  }

  // Attack
  if (keys['x'] || keys['z'] || keys['Enter']) {
    playerAttack();
  }

  // Physics
  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  if (player.attackCooldown > 0) player.attackCooldown--;
  if (player.invincible > 0) player.invincible--;

  // Platform collision
  platforms.forEach(p => {
    if (player.vy > 0 &&
        player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // World bounds
  if (player.x < 0) player.x = 0;
  if (player.x > worldWidth - player.w) player.x = worldWidth - player.w;
  if (player.y > H + 100) {
    player.hp--;
    player.x = 100; player.y = H - 200; player.vy = 0;
    if (player.hp <= 0) gameOver();
  }

  // Quiz station collision
  quizStations.forEach(qs => {
    if (!qs.used && rectsOverlap(player, qs)) {
      openQuiz(qs);
    }
  });

  // Enemy collision
  if (player.invincible <= 0) {
    enemies.forEach(e => {
      if (rectsOverlap(player, e)) {
        player.hp--;
        player.invincible = 60;
        player.vy = -8;
        player.vx = (player.x < e.x ? -5 : 5);
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#EC4899', 10);
        if (player.hp <= 0) gameOver();
      }
    });
  }

  // Boss collision
  if (boss && player.invincible <= 0 && rectsOverlap(player, boss)) {
    player.hp -= 2;
    player.invincible = 90;
    player.vy = -10;
    player.vx = (player.x < boss.x ? -8 : 8);
    spawnParticles(player.x + player.w/2, player.y + player.h/2, '#EC4899', 15);
    if (player.hp <= 0) gameOver();
  }

  // Camera
  camera.x = Math.max(0, Math.min(worldWidth - W, player.x - W/3));
  updateHUD();
}

function updateEnemies() {
  enemies.forEach((e, idx) => {
    e.vy += gravity;
    e.x += e.vx;
    e.y += e.vy;
    e.onGround = false;
    if (e.hitTimer > 0) e.hitTimer--;

    platforms.forEach(p => {
      if (e.vy > 0 && e.x + e.w > p.x && e.x < p.x + p.w &&
          e.y + e.h > p.y && e.y + e.h < p.y + p.h + 15) {
        e.y = p.y - e.h;
        e.vy = 0;
        e.onGround = true;
      }
    });

    // Simple AI: walk toward player
    if (Math.abs(e.x - player.x) < 400) {
      e.vx = e.x < player.x ? 2 : -2;
    }

    if (e.y > H + 100) { enemies.splice(idx, 1); return; }
    if (e.hp <= 0) {
      spawnParticles(e.x + e.w/2, e.y + e.h/2, '#F59E0B', 15);
      score += 100;
      enemies.splice(idx, 1);
    }
  });
}

function updateBoss() {
  if (!boss) return;
  boss.vy += gravity;
  boss.x += boss.vx;
  boss.y += boss.vy;
  boss.onGround = false;
  if (boss.hitTimer > 0) boss.hitTimer--;

  platforms.forEach(p => {
    if (boss.vy > 0 && boss.x + boss.w > p.x && boss.x < p.x + p.w &&
        boss.y + boss.h > p.y && boss.y + boss.h < p.y + p.h + 15) {
      boss.y = p.y - boss.h;
      boss.vy = 0;
      boss.onGround = true;
    }
  });

  // Boss AI
  if (boss.x < 3410 || boss.x > 3850) boss.vx *= -1;
  boss.attackTimer++;
  if (boss.attackTimer > 90) {
    boss.attackTimer = 0;
    // Boss shoots at player
    const dx = player.x - boss.x;
    const dy = player.y - boss.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    projectiles.push({
      x: boss.x + boss.w/2, y: boss.y + boss.h/2,
      vx: (dx/dist) * 5, vy: (dy/dist) * 5,
      dmg: 1, color: '#EC4899', life: 120, owner: 'boss', size: 10,
    });
    // Phase 2: double shot
    if (boss.hp < boss.maxHp * 0.5) {
      setTimeout(() => {
        if (!boss) return;
        projectiles.push({
          x: boss.x + boss.w/2, y: boss.y + boss.h/3,
          vx: (dx/dist) * 6 + (Math.random()-0.5)*2,
          vy: (dy/dist) * 6 + (Math.random()-0.5)*2,
          dmg: 1, color: '#F59E0B', life: 100, owner: 'boss', size: 8,
        });
      }, 200);
    }
  }

  // Boss jump
  if (boss.onGround && Math.random() < 0.02) {
    boss.vy = -10;
  }

  // Update HP bar
  document.getElementById('boss-hp-fill').style.width = `${(boss.hp / boss.maxHp) * 100}%`;

  if (boss.hp <= 0) {
    spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#F59E0B', 40);
    spawnParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#EC4899', 40);
    score += 2000;
    boss = null;
    document.getElementById('boss-hp-container').style.display = 'none';
    victory();
  }
}

function updateProjectiles() {
  projectiles.forEach((p, idx) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    // Trail particles
    if (Math.random() < 0.3) {
      particles.push({
        x: p.x, y: p.y,
        vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
        life: 10, maxLife: 10, color: p.color, size: p.size * 0.4,
      });
    }

    if (p.life <= 0) { projectiles.splice(idx, 1); return; }

    if (p.owner === 'player') {
      enemies.forEach(e => {
        if (rectsOverlap({ x: p.x-p.size/2, y: p.y-p.size/2, w: p.size, h: p.size }, e)) {
          e.hp -= p.dmg;
          e.hitTimer = 10;
          spawnParticles(p.x, p.y, p.color, 8);
          projectiles.splice(idx, 1);
        }
      });
      if (boss && rectsOverlap({ x: p.x-p.size/2, y: p.y-p.size/2, w: p.size, h: p.size }, boss)) {
        boss.hp -= p.dmg;
        boss.hitTimer = 10;
        spawnParticles(p.x, p.y, '#EC4899', 10);
        projectiles.splice(idx, 1);
      }
    } else if (p.owner === 'boss' && player.invincible <= 0) {
      if (rectsOverlap({ x: p.x-p.size/2, y: p.y-p.size/2, w: p.size, h: p.size }, player)) {
        player.hp -= p.dmg;
        player.invincible = 60;
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#EC4899', 8);
        projectiles.splice(idx, 1);
        if (player.hp <= 0) gameOver();
      }
    }
  });
}

function updateParticles() {
  particles.forEach((p, idx) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(idx, 1);
  });
}

function gameOver() {
  state = 'gameover';
  const overlay = document.getElementById('screen-overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <h2>Score: ${score}</h2>
    <p>Quizzes Completed: ${quizzesCompleted}/3</p>
    <p>Weapon Reached: ${weapons[weaponLevel].icon} ${weapons[weaponLevel].name}</p>
    <button class="start-btn" onclick="startGame()">TRY AGAIN</button>
  `;
}

function victory() {
  state = 'victory';
  setTimeout(() => {
    const overlay = document.getElementById('screen-overlay');
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h1>VICTORY!</h1>
      <h2>The Quiz Master is Defeated!</h2>
      <p>Final Score: ${score}</p>
      <p>Final Weapon: ${weapons[weaponLevel].icon} ${weapons[weaponLevel].name}</p>
      <p>You combined platforming, trivia, and combat!</p>
      <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
    `;
  }, 1000);
}

function draw() {
  ctx.fillStyle = '#0D0D1A';
  ctx.fillRect(0, 0, W, H);

  // Parallax stars
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137 + 50) % worldWidth) - camera.x * 0.3;
    const sy = (i * 97 + 30) % H;
    const bright = 0.3 + (i % 3) * 0.2;
    ctx.fillStyle = `rgba(255,255,255,${bright})`;
    ctx.fillRect(((sx % W) + W) % W, sy, 2, 2);
  }

  ctx.save();
  ctx.translate(-camera.x, 0);

  // Platforms
  platforms.forEach(p => {
    if (p.x + p.w < camera.x - 50 || p.x > camera.x + W + 50) return;
    if (p.type === 'ground') {
      const grad = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
      grad.addColorStop(0, '#2D1B69');
      grad.addColorStop(1, '#1A1A2E');
      ctx.fillStyle = grad;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.strokeStyle = '#7C3AED';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.w, p.y);
      ctx.stroke();
    } else {
      const grad = ctx.createLinearGradient(0, p.y, 0, p.y + 15);
      grad.addColorStop(0, '#7C3AED');
      grad.addColorStop(1, '#4C1D95');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, 15, 5);
      ctx.fill();
      ctx.fillStyle = 'rgba(124,58,237,0.2)';
      ctx.fillRect(p.x + 5, p.y + 15, p.w - 10, 8);
    }
  });

  // Quiz stations
  quizStations.forEach(qs => {
    if (qs.used) return;
    const bob = Math.sin(Date.now() / 300 + qs.id) * 5;
    ctx.font = '36px serif';
    ctx.textAlign = 'center';
    ctx.fillText('❓', qs.x + qs.w/2, qs.y + qs.h/2 + bob + 10);
    // Glow
    ctx.shadowColor = '#F59E0B';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(245,158,11,0.15)';
    ctx.beginPath();
    ctx.arc(qs.x + qs.w/2, qs.y + qs.h/2 + bob, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(e => {
    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    if (e.hitTimer > 0) {
      ctx.shadowColor = '#FF0000';
      ctx.shadowBlur = 15;
    }
    ctx.fillText('👹', e.x + e.w/2, e.y + e.h - 2);
    ctx.shadowBlur = 0;
    // HP bar
    const hpW = e.w;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(e.x, e.y - 10, hpW, 5);
    ctx.fillStyle = '#EC4899';
    ctx.fillRect(e.x, e.y - 10, hpW * (e.hp / e.maxHp), 5);
  });

  // Boss
  if (boss) {
    ctx.font = '56px serif';
    ctx.textAlign = 'center';
    if (boss.hitTimer > 0) {
      ctx.shadowColor = '#FF0000';
      ctx.shadowBlur = 25;
    }
    ctx.fillText('🧙', boss.x + boss.w/2, boss.y + boss.h - 5);
    ctx.shadowBlur = 0;
    // Boss aura
    ctx.strokeStyle = `rgba(236,72,153,${0.3 + Math.sin(Date.now()/200)*0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(boss.x + boss.w/2, boss.y + boss.h/2, 50 + Math.sin(Date.now()/300)*10, 0, Math.PI*2);
    ctx.stroke();
  }

  // Projectiles
  projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Player
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    // Blink when invincible
  } else {
    ctx.font = '38px serif';
    ctx.textAlign = 'center';
    ctx.save();
    if (player.facing < 0) {
      ctx.translate(player.x + player.w/2, 0);
      ctx.scale(-1, 1);
      ctx.fillText('🏃', 0, player.y + player.h - 2);
    } else {
      ctx.fillText('🏃', player.x + player.w/2, player.y + player.h - 2);
    }
    ctx.restore();
    // Weapon glow
    if (weaponLevel > 0) {
      ctx.shadowColor = weapons[weaponLevel].color;
      ctx.shadowBlur = 10 + weaponLevel * 5;
      ctx.fillStyle = `${weapons[weaponLevel].color}33`;
      ctx.beginPath();
      ctx.arc(player.x + player.w/2, player.y + player.h/2, 20 + weaponLevel * 3, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  ctx.restore();

  // Direction arrow for quiz stations
  if (!quizActive && quizzesCompleted < 3) {
    const nextStation = quizStations.find(qs => !qs.used);
    if (nextStation) {
      const sx = nextStation.x + nextStation.w/2 - camera.x;
      if (sx < 30) {
        ctx.font = '24px serif';
        ctx.fillText('⬅️', 30, 30 + Math.sin(Date.now()/300)*5);
      } else if (sx > W - 30) {
        ctx.font = '24px serif';
        ctx.fillText('➡️', W - 30, 30 + Math.sin(Date.now()/300)*5);
      }
    }
  }
}

function gameLoop() {
  if (state === 'platforming' || state === 'boss') {
    if (!quizActive) {
      updatePlayer();
      updateEnemies();
      updateBoss();
      updateProjectiles();
      updateParticles();
    }
  }
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

gameLoop();
</script>
</body>
