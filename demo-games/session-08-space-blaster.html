<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session 8: Space Blaster</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1A1A2E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #E2E8F0;
    overflow: hidden;
  }
  #header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 12px;
    width: 700px;
  }
  h1 {
    font-size: 1.4rem;
    background: linear-gradient(135deg, #7C3AED, #10B981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hud {
    display: flex;
    gap: 16px;
    font-size: 0.9rem;
    margin-left: auto;
  }
  .hud-item {
    background: rgba(124, 58, 237, 0.2);
    border: 1px solid rgba(124, 58, 237, 0.4);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .hud-item span { color: #F59E0B; font-weight: bold; }
  canvas {
    border: 2px solid #7C3AED;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
  }
  #controls {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #64748B;
    width: 700px;
    text-align: center;
  }
  kbd {
    background: #334155;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid #475569;
    font-size: 0.75rem;
  }
</style>
</head>
<body>
<div id="header">
  <h1>Session 8: Space Blaster</h1>
  <div class="hud">
    <div class="hud-item">Lives: <span id="lives">3</span></div>
    <div class="hud-item">Score: <span id="score">0</span></div>
    <div class="hud-item">Wave: <span id="wave">1</span></div>
    <div class="hud-item">Power: <span id="power">---</span></div>
  </div>
</div>
<canvas id="game" width="700" height="600"></canvas>
<div id="controls">
  <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;&nbsp;
  <kbd>Space</kbd> Shoot &nbsp;&nbsp;
  <kbd>R</kbd> Restart
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 700, H = 600;

const livesEl = document.getElementById('lives');
const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const powerEl = document.getElementById('power');

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR') initGame();
  if (game.state === 'title' && (e.code === 'Space' || e.code === 'Enter')) {
    game.state = 'playing';
    startWave(1);
  }
  if (game.state === 'gameOver' && (e.code === 'Space' || e.code === 'Enter')) {
    initGame();
    game.state = 'playing';
    startWave(1);
  }
  if (game.state === 'win' && (e.code === 'Space' || e.code === 'Enter')) {
    initGame();
    game.state = 'playing';
    startWave(1);
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Game state
let game, player, bullets, enemies, enemyBullets, powerups, particles, stars, explosions;

function initGame() {
  game = {
    state: 'title',
    score: 0,
    lives: 3,
    wave: 1,
    timer: 0,
    waveTimer: 0,
    waveDelay: 0,
    shakeX: 0, shakeY: 0,
    shakeTimer: 0,
  };
  player = {
    x: W / 2 - 16, y: H - 70, w: 32, h: 36,
    vx: 0,
    speed: 5.5,
    shootCooldown: 0,
    shootRate: 12,
    powerUp: null,
    powerTimer: 0,
    shieldHP: 0,
    invincible: 0,
  };
  bullets = [];
  enemies = [];
  enemyBullets = [];
  powerups = [];
  particles = [];
  explosions = [];

  // Stars
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 0.3 + Math.random() * 1.5,
      size: 0.5 + Math.random() * 1.5,
      brightness: 0.3 + Math.random() * 0.7,
    });
  }
  updateHUD();
}

function updateHUD() {
  livesEl.textContent = game.lives;
  scoreEl.textContent = game.score;
  waveEl.textContent = game.wave;
  let pName = '---';
  if (player.powerUp === 'spread') pName = 'SPREAD';
  else if (player.powerUp === 'rapid') pName = 'RAPID';
  else if (player.shieldHP > 0) pName = 'SHIELD';
  powerEl.textContent = pName;
}

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    let angle = Math.random() * Math.PI * 2;
    let spd = (speed || 3) * (0.5 + Math.random());
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
      size: 1.5 + Math.random() * 2.5,
    });
  }
}

function spawnExplosion(x, y, size) {
  explosions.push({
    x, y,
    radius: 5,
    maxRadius: size || 25,
    life: 15,
    maxLife: 15,
  });
  spawnParticles(x, y, '#F59E0B', 12, 4);
  spawnParticles(x, y, '#EF4444', 8, 3);
  spawnParticles(x, y, '#FBBF24', 6, 2);
  // Screen shake
  game.shakeTimer = 6;
}

function startWave(n) {
  game.wave = n;
  game.waveTimer = 0;
  game.waveDelay = 60;
  enemies = [];
  enemyBullets = [];

  if (n <= 2) {
    // Basic UFOs in formation
    let rows = n === 1 ? 2 : 3;
    let cols = n === 1 ? 5 : 6;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        enemies.push({
          type: 'ufo',
          x: 80 + c * 90,
          y: -40 - r * 50,
          targetY: 60 + r * 55,
          w: 32, h: 28,
          hp: 1,
          speed: 1 + n * 0.3,
          dir: 1,
          shootTimer: Math.random() * 200 + 100,
          entered: false,
          points: 100,
        });
      }
    }
  } else if (n <= 4) {
    // Fast diagonal aliens
    let count = n === 3 ? 12 : 16;
    for (let i = 0; i < count; i++) {
      let row = Math.floor(i / 6);
      let col = i % 6;
      enemies.push({
        type: 'alien',
        x: 60 + col * 100,
        y: -40 - row * 50,
        targetY: 50 + row * 55,
        w: 30, h: 28,
        hp: n === 3 ? 1 : 2,
        speed: 2 + (n - 3) * 0.5,
        dir: (col % 2 === 0) ? 1 : -1,
        diagonalTimer: 0,
        diagonalPhase: Math.random() * Math.PI * 2,
        shootTimer: Math.random() * 150 + 60,
        entered: false,
        points: 150,
      });
    }
  } else {
    // Boss wave - add a few minions too
    for (let i = 0; i < 4; i++) {
      enemies.push({
        type: 'alien',
        x: 100 + i * 140,
        y: -40,
        targetY: 60,
        w: 30, h: 28,
        hp: 2,
        speed: 2,
        dir: (i % 2 === 0) ? 1 : -1,
        diagonalTimer: 0,
        diagonalPhase: Math.random() * Math.PI * 2,
        shootTimer: Math.random() * 100 + 60,
        entered: false,
        points: 150,
      });
    }
    // Boss
    enemies.push({
      type: 'boss',
      x: W / 2 - 40,
      y: -80,
      targetY: 70,
      w: 80, h: 60,
      hp: 10,
      maxHP: 10,
      speed: 1.5,
      dir: 1,
      shootTimer: 0,
      attackPattern: 0,
      patternTimer: 0,
      entered: false,
      points: 2000,
    });
  }
  updateHUD();
}

function playerShoot() {
  if (player.shootCooldown > 0) return;

  let rate = player.powerUp === 'rapid' ? 5 : player.shootRate;
  player.shootCooldown = rate;

  if (player.powerUp === 'spread') {
    // 3 bullets in a spread
    for (let angle = -0.2; angle <= 0.2; angle += 0.2) {
      bullets.push({
        x: player.x + player.w / 2 - 3,
        y: player.y - 4,
        w: 6, h: 14,
        vx: Math.sin(angle) * 3,
        vy: -8,
        damage: 1,
      });
    }
  } else {
    bullets.push({
      x: player.x + player.w / 2 - 3,
      y: player.y - 4,
      w: 6, h: 14,
      vx: 0,
      vy: -8,
      damage: 1,
    });
  }
}

function update() {
  if (game.state !== 'playing') {
    game.timer++;
    // Scroll stars even on menus
    for (let s of stars) {
      s.y += s.speed * 0.5;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
    return;
  }
  game.timer++;
  game.waveTimer++;

  // Screen shake
  if (game.shakeTimer > 0) {
    game.shakeX = (Math.random() - 0.5) * 6;
    game.shakeY = (Math.random() - 0.5) * 6;
    game.shakeTimer--;
  } else {
    game.shakeX = 0;
    game.shakeY = 0;
  }

  // Stars
  for (let s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // Player movement
  if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -player.speed;
  else if (keys['ArrowRight'] || keys['KeyD']) player.vx = player.speed;
  else player.vx *= 0.8;

  player.x += player.vx;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // Shooting
  if (keys['Space']) playerShoot();
  if (player.shootCooldown > 0) player.shootCooldown--;

  // Power-up timer
  if (player.powerUp) {
    player.powerTimer--;
    if (player.powerTimer <= 0) {
      player.powerUp = null;
      player.shootRate = 12;
    }
  }
  if (player.invincible > 0) player.invincible--;

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y > -20 && b.y < H + 20;
  });

  // Wave delay
  if (game.waveDelay > 0) {
    game.waveDelay--;
  }

  // Enemies
  for (let e of enemies) {
    // Enter screen
    if (!e.entered) {
      e.y += 2;
      if (e.y >= e.targetY) {
        e.y = e.targetY;
        e.entered = true;
      }
      continue;
    }

    if (e.type === 'ufo') {
      e.x += e.speed * e.dir;
      if (e.x <= 10 || e.x >= W - e.w - 10) e.dir *= -1;
      // Shoot occasionally
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = 150 + Math.random() * 100;
        enemyBullets.push({
          x: e.x + e.w / 2 - 3,
          y: e.y + e.h,
          w: 6, h: 10,
          vx: 0,
          vy: 3,
        });
      }
    } else if (e.type === 'alien') {
      e.diagonalTimer += 0.03;
      e.x += e.speed * e.dir + Math.sin(e.diagonalTimer + e.diagonalPhase) * 1.5;
      if (e.x <= 5 || e.x >= W - e.w - 5) e.dir *= -1;
      // Shoot
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = 80 + Math.random() * 80;
        let dx = (player.x + player.w / 2) - (e.x + e.w / 2);
        let dy = (player.y) - (e.y + e.h);
        let dist = Math.sqrt(dx * dx + dy * dy);
        enemyBullets.push({
          x: e.x + e.w / 2 - 3,
          y: e.y + e.h,
          w: 6, h: 10,
          vx: (dx / dist) * 3,
          vy: (dy / dist) * 3,
        });
      }
    } else if (e.type === 'boss') {
      // Boss patterns
      e.patternTimer++;
      if (e.patternTimer > 180) {
        e.attackPattern = (e.attackPattern + 1) % 3;
        e.patternTimer = 0;
      }

      // Movement
      e.x += e.speed * e.dir;
      if (e.x <= 20 || e.x >= W - e.w - 20) e.dir *= -1;

      // Attacks
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        if (e.attackPattern === 0) {
          // Spread shot
          e.shootTimer = 40;
          for (let a = -0.4; a <= 0.4; a += 0.2) {
            enemyBullets.push({
              x: e.x + e.w / 2 - 3,
              y: e.y + e.h,
              w: 8, h: 8,
              vx: Math.sin(a) * 3,
              vy: 3 + Math.abs(a),
            });
          }
        } else if (e.attackPattern === 1) {
          // Aimed shot
          e.shootTimer = 25;
          let dx = (player.x + player.w / 2) - (e.x + e.w / 2);
          let dy = (player.y) - (e.y + e.h);
          let dist = Math.sqrt(dx * dx + dy * dy);
          enemyBullets.push({
            x: e.x + e.w / 2 - 4,
            y: e.y + e.h,
            w: 8, h: 8,
            vx: (dx / dist) * 4.5,
            vy: (dy / dist) * 4.5,
          });
        } else {
          // Circle burst
          e.shootTimer = 60;
          for (let i = 0; i < 8; i++) {
            let angle = (i / 8) * Math.PI * 2 + game.timer * 0.05;
            enemyBullets.push({
              x: e.x + e.w / 2 - 3,
              y: e.y + e.h / 2,
              w: 6, h: 6,
              vx: Math.cos(angle) * 2.5,
              vy: Math.sin(angle) * 2.5,
            });
          }
        }
      }
    }
  }

  // Bullet-enemy collision
  for (let b of bullets) {
    for (let e of enemies) {
      if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
        e.hp -= b.damage;
        b.y = -100; // Mark for removal
        spawnParticles(b.x + b.w / 2, b.y, '#A78BFA', 4, 2);

        if (e.hp <= 0) {
          game.score += e.points;
          spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, e.type === 'boss' ? 50 : 25);

          // Drop power-up (20% chance, or guaranteed from boss)
          if (e.type === 'boss' || Math.random() < 0.2) {
            let types = ['spread', 'rapid', 'shield'];
            let type = types[Math.floor(Math.random() * types.length)];
            powerups.push({
              x: e.x + e.w / 2 - 10,
              y: e.y + e.h / 2,
              w: 20, h: 20,
              vy: 1.5,
              type,
            });
          }
          e.hp = -999; // Mark for removal
        }
        break;
      }
    }
  }
  enemies = enemies.filter(e => e.hp > -999);
  bullets = bullets.filter(b => b.y > -50);

  // Enemy bullet - player collision
  for (let b of enemyBullets) {
    if (player.invincible > 0) continue;
    if (b.x < player.x + player.w && b.x + b.w > player.x &&
        b.y < player.y + player.h && b.y + b.h > player.y) {
      b.y = H + 100;
      if (player.shieldHP > 0) {
        player.shieldHP--;
        if (player.shieldHP <= 0) {
          player.powerUp = null;
        }
        spawnParticles(player.x + player.w / 2, player.y, '#F59E0B', 6, 3);
      } else {
        game.lives--;
        player.invincible = 90;
        spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, 20);
        if (game.lives <= 0) {
          game.state = 'gameOver';
        }
      }
    }
  }

  // Enemy - player collision
  for (let e of enemies) {
    if (player.invincible > 0) continue;
    if (e.x < player.x + player.w && e.x + e.w > player.x &&
        e.y < player.y + player.h && e.y + e.h > player.y) {
      if (player.shieldHP > 0) {
        player.shieldHP = 0;
        player.powerUp = null;
        spawnParticles(player.x + player.w / 2, player.y, '#F59E0B', 8, 3);
      } else {
        game.lives--;
        player.invincible = 90;
        spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, 20);
        if (game.lives <= 0) {
          game.state = 'gameOver';
        }
      }
    }
  }

  // Power-ups
  powerups = powerups.filter(p => {
    p.y += p.vy;
    // Collect
    if (p.x < player.x + player.w && p.x + p.w > player.x &&
        p.y < player.y + player.h && p.y + p.h > player.y) {
      if (p.type === 'spread') {
        player.powerUp = 'spread';
        player.powerTimer = 600;
      } else if (p.type === 'rapid') {
        player.powerUp = 'rapid';
        player.powerTimer = 500;
      } else if (p.type === 'shield') {
        player.shieldHP = 1;
        player.powerUp = 'shield';
        player.powerTimer = 9999;
      }
      spawnParticles(p.x + p.w / 2, p.y + p.h / 2, '#10B981', 10, 3);
      return false;
    }
    return p.y < H + 20;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    return p.life > 0;
  });

  // Explosions
  explosions = explosions.filter(e => {
    e.radius += (e.maxRadius - e.radius) * 0.3;
    e.life--;
    return e.life > 0;
  });

  // Check wave complete
  if (enemies.length === 0 && game.waveDelay <= 0 && game.waveTimer > 60) {
    if (game.wave >= 5) {
      game.state = 'win';
    } else {
      game.wave++;
      startWave(game.wave);
    }
  }

  updateHUD();
}

// Rendering
function drawStars() {
  for (let s of stars) {
    let twinkle = Math.sin(game.timer * 0.03 + s.x) * 0.2 + 0.8;
    ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness * twinkle})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  let sx = player.x, sy = player.y;

  // Engine glow
  let glowIntensity = 0.5 + Math.sin(game.timer * 0.2) * 0.2;
  ctx.shadowColor = '#7C3AED';
  ctx.shadowBlur = 15 * glowIntensity;

  // Ship emoji
  ctx.font = '32px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F680}', sx + player.w / 2, sy + player.h / 2);

  ctx.shadowBlur = 0;

  // Engine trail
  let trailX = sx + player.w / 2;
  let trailY = sy + player.h + 4;
  let trailGrad = ctx.createRadialGradient(trailX, trailY, 0, trailX, trailY, 12 + Math.random() * 5);
  trailGrad.addColorStop(0, 'rgba(124, 58, 237, 0.7)');
  trailGrad.addColorStop(0.5, 'rgba(236, 72, 153, 0.3)');
  trailGrad.addColorStop(1, 'rgba(124, 58, 237, 0)');
  ctx.fillStyle = trailGrad;
  ctx.fillRect(trailX - 12, trailY, 24, 16 + Math.random() * 8);

  // Shield visual
  if (player.shieldHP > 0) {
    ctx.strokeStyle = `rgba(245, 158, 11, ${0.4 + Math.sin(game.timer * 0.1) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx + player.w / 2, sy + player.h / 2, 22, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(245, 158, 11, ${0.2 + Math.sin(game.timer * 0.15) * 0.1})`;
    ctx.beginPath();
    ctx.arc(sx + player.w / 2, sy + player.h / 2, 26, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawBullets() {
  for (let b of bullets) {
    // Bullet glow
    let grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, '#A78BFA');
    grad.addColorStop(1, '#7C3AED');
    ctx.fillStyle = grad;
    ctx.shadowColor = '#A78BFA';
    ctx.shadowBlur = 6;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;

    // Bullet trail
    ctx.fillStyle = 'rgba(167, 139, 250, 0.3)';
    ctx.fillRect(b.x + 1, b.y + b.h, b.w - 2, 8);
  }

  // Enemy bullets
  for (let b of enemyBullets) {
    ctx.fillStyle = '#EF4444';
    ctx.shadowColor = '#EF4444';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2, b.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawEnemies() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let e of enemies) {
    if (e.type === 'ufo') {
      ctx.font = '30px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      ctx.fillText('\u{1F6F8}', e.x + e.w / 2, e.y + e.h / 2);
    } else if (e.type === 'alien') {
      ctx.font = '28px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      let wobble = Math.sin(game.timer * 0.1 + e.x * 0.01) * 2;
      ctx.fillText('\u{1F47E}', e.x + e.w / 2, e.y + e.h / 2 + wobble);
    } else if (e.type === 'boss') {
      // Boss with health bar
      ctx.font = '56px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      let pulse = Math.sin(game.timer * 0.08) * 3;

      ctx.shadowColor = '#EF4444';
      ctx.shadowBlur = 12 + pulse;
      ctx.fillText('\u{1F419}', e.x + e.w / 2, e.y + e.h / 2 + pulse);
      ctx.shadowBlur = 0;

      // Health bar
      let barW = 80, barH = 6;
      let barX = e.x + e.w / 2 - barW / 2;
      let barY = e.y - 15;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(barX, barY, barW, barH);
      let hpRatio = e.hp / e.maxHP;
      let hpColor = hpRatio > 0.5 ? '#10B981' : hpRatio > 0.25 ? '#F59E0B' : '#EF4444';
      ctx.fillStyle = hpColor;
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
    }
  }
}

function drawPowerups() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '20px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';

  for (let p of powerups) {
    let bounce = Math.sin(game.timer * 0.1 + p.x) * 2;
    let emoji, glowColor;
    if (p.type === 'spread') { emoji = '\u{1F535}'; glowColor = '#3B82F6'; }
    else if (p.type === 'rapid') { emoji = '\u{1F7E2}'; glowColor = '#10B981'; }
    else { emoji = '\u{1F7E1}'; glowColor = '#F59E0B'; }

    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 10;
    ctx.fillText(emoji, p.x + p.w / 2, p.y + p.h / 2 + bounce);
    ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (let p of particles) {
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawExplosions() {
  for (let e of explosions) {
    let alpha = e.life / e.maxLife;
    let grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
    grad.addColorStop(0, `rgba(255, 200, 50, ${alpha})`);
    grad.addColorStop(0.4, `rgba(255, 100, 30, ${alpha * 0.6})`);
    grad.addColorStop(1, `rgba(255, 50, 20, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawOverlay(title, subtitle, color) {
  ctx.fillStyle = 'rgba(26, 26, 46, 0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = color || '#F59E0B';
  ctx.shadowColor = color || '#F59E0B';
  ctx.shadowBlur = 20;
  ctx.fillText(title, W / 2, H / 2 - 30);
  ctx.shadowBlur = 0;

  ctx.font = '20px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#A78BFA';
  ctx.fillText(subtitle, W / 2, H / 2 + 20);

  let blink = Math.sin(game.timer * 0.08) > 0;
  if (blink) {
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#64748B';
    ctx.fillText('Press SPACE to continue', W / 2, H / 2 + 60);
  }
}

function drawTitleScreen() {
  ctx.fillStyle = '#0F0F23';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 52px "Segoe UI", system-ui, sans-serif';
  let grad = ctx.createLinearGradient(W / 2 - 200, 0, W / 2 + 200, 0);
  grad.addColorStop(0, '#7C3AED');
  grad.addColorStop(0.5, '#10B981');
  grad.addColorStop(1, '#F59E0B');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#7C3AED';
  ctx.shadowBlur = 20;
  ctx.fillText('Space Blaster', W / 2, H / 2 - 80);
  ctx.shadowBlur = 0;

  ctx.font = '60px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
  let bounce = Math.sin(game.timer * 0.05) * 8;
  ctx.fillText('\u{1F680}', W / 2, H / 2 + 10 + bounce);

  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#A78BFA';
  ctx.fillText('Arrow Keys to Move  |  Space to Shoot', W / 2, H / 2 + 80);

  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#64748B';
  ctx.fillText('Survive 5 waves and defeat the boss!', W / 2, H / 2 + 110);
  ctx.fillText('Power-ups: \u{1F535} Spread  \u{1F7E2} Rapid Fire  \u{1F7E1} Shield', W / 2, H / 2 + 135);

  let blink = Math.sin(game.timer * 0.08) > 0;
  if (blink) {
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#10B981';
    ctx.fillText('Press SPACE to start', W / 2, H / 2 + 175);
  }
}

function render() {
  ctx.save();
  ctx.translate(game.shakeX || 0, game.shakeY || 0);

  // Background
  ctx.fillStyle = '#0F0F23';
  ctx.fillRect(-10, -10, W + 20, H + 20);
  drawStars();

  if (game.state === 'title') {
    ctx.restore();
    drawTitleScreen();
    return;
  }

  drawExplosions();
  drawEnemies();
  drawBullets();
  drawPowerups();
  if (game.state === 'playing') drawPlayer();
  drawParticles();

  ctx.restore();

  // Wave announcement
  if (game.waveDelay > 30 && game.state === 'playing') {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
    let alpha = (game.waveDelay - 30) / 30;
    ctx.fillStyle = `rgba(245, 158, 11, ${alpha})`;
    ctx.shadowColor = '#F59E0B';
    ctx.shadowBlur = 15;
    let waveText = game.wave === 5 ? 'BOSS WAVE!' : `Wave ${game.wave}`;
    ctx.fillText(waveText, W / 2, H / 2);
    ctx.shadowBlur = 0;
  }

  if (game.state === 'gameOver') {
    drawOverlay('Game Over', `Final Score: ${game.score}`, '#EF4444');
  }
  if (game.state === 'win') {
    drawOverlay('Victory!', `All waves cleared!  Score: ${game.score}`, '#10B981');
  }
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();
</script>
</body>
</html>
